name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set release version
        id: vars
        run: |
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            PKG_VERSION=$(node -p "require('./package.json').version")
            if [ "$TAG_NAME" != "$PKG_VERSION" ]; then
              echo "Tag $TAG_NAME does not match package.json version $PKG_VERSION"
              exit 1
            fi
            echo "version=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build VSIX package
        run: node_modules/.bin/vsce package

      - name: Read changelog
        id: changelog
        run: |
            FILE=".changes/${{ steps.vars.outputs.version }}.md"
            if [ -f "$FILE" ]; then
              {
                echo 'content<<EOF'
                cat "$FILE"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
            else
              echo "content=No changelog found." >> "$GITHUB_OUTPUT"
            fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.vars.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: "*.vsix"
